plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

ext.abiCodes = ["armeabi-v7a": 1, "arm64-v8a": 2, "x86_64": 3]

// ============================================================
// 读取 local.properties
// ============================================================
def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

// ============================================================
// 可选：读取签名配置（云端构建时可忽略）
// ============================================================
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def hasKeystore = keystorePropertiesFile.exists()
if (hasKeystore) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace = "com.github.wgh136.venera"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "28.0.13004108"

    packaging {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    splits {
        abi {
            reset()
            enable true
            universalApk true
            include 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"   // ← 修复：应为字符串
    }

    // ============================================================
    // 签名配置：有 key.properties 就用正式签名，否则用 debug 签名
    // ============================================================
    signingConfigs {
        if (hasKeystore) {
            release {
                keyAlias    = keystoreProperties["keyAlias"]
                keyPassword = keystoreProperties["keyPassword"]
                storeFile   = file(keystoreProperties["storeFile"])
                storePassword = keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = "com.github.wgh136.venera"
        minSdk        = flutter.minSdkVersion
        targetSdk     = flutter.targetSdkVersion
        versionCode   = flutterVersionCode.toInteger()
        versionName   = flutterVersionName
    }

    buildTypes {
        release {
            // ─── 混淆 & 资源压缩 ───
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                          'proguard-rules.pro'

            // ─── 签名 ───
            signingConfig = hasKeystore
                ? signingConfigs.release
                : signingConfigs.debug   // 没有正式签名时回退到 debug，避免构建失败

            // 移除了冗余的 ndk.abiFilters（splits 已处理）
        }

        debug {
            // debug 默认使用 debug 签名，无需额外配置
            // 移除了冗余的 ndk.abiFilters
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            if (variant.buildType.name == "release") {
                if (abi != null) {
                    outputFileName = "venera-${variant.versionName}-${abi}.apk"
                    def abiVersionCode = project.ext.abiCodes.get(abi)
                    if (abiVersionCode != null) {
                        versionCodeOverride = variant.versionCode * 10 + abiVersionCode
                    }
                } else {
                    outputFileName = "venera-${variant.versionName}.apk"
                    versionCodeOverride = variant.versionCode * 10
                }
            } else if (variant.buildType.name == "debug") {
                versionCodeOverride = variant.versionCode * 10 + 4
            }
        }
    }

    dependenciesInfo {
        includeInApk    = false
        includeInBundle = false
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "androidx.activity:activity-ktx:1.10.1"
    implementation "androidx.documentfile:documentfile:1.0.1"
}
